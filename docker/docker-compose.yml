services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: uav-mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"
      - "8888:8888"
      - "8889:8889"
      - "9997:9997"
      - "9998:9998"
      - "8189:8189/udp"
    volumes:
      - ../app/config/mediamtx.yml:/mediamtx.yml:ro
      - ../records:/app/records
      - ../hls:/app/hls
      - ../logs:/app/logs
    command: ["/mediamtx", "/mediamtx.yml"]

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: uav-streaming-app
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DOCKERIZED: "true"
      HOST_DOCKER_INTERNAL: host.docker.internal
      MEDIAMTX_HOST: mediamtx
      MEDIAMTX_MANAGED: "false"
      APP_LOG_PATH: /app/logs/app.log
      HEALTHCHECK_PATH: /app/logs/health.json
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mediamtx:
        condition: service_started
    volumes:
      - ..:/app
    command: ["python", "-m", "app.main"]
    healthcheck:
      test: ["CMD", "python", "-m", "app.streaming.healthcheck"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
