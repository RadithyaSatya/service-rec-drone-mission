logLevel: info
logDestinations: [stdout]
logStructured: true
readTimeout: 10s
writeTimeout: 10s
writeQueueSize: 1024

api: yes
apiAddress: :9997

metrics: yes
metricsAddress: :9998

rtsp: yes
rtspTransports: [tcp]
rtspAddress: :8554

hls: yes
hlsAddress: :8888
hlsAlwaysRemux: yes
hlsVariant: lowLatency
hlsSegmentCount: 4
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsDirectory: /app/hls

webrtc: yes
webrtcAddress: :8889
webrtcEncryption: false
webrtcLocalUDPAddress: :8189
webrtcIPsFromInterfaces: yes
webrtcAdditionalHosts: []

pathDefaults:
  source: publisher
  overridePublisher: yes
  record: yes
  recordPath: /app/records/_raw/%path/%Y/%m/%d/%H/%M/%S-%f
  recordFormat: fmp4
  recordPartDuration: 1s
  recordSegmentDuration: 1m

paths:
  "~^uav/.+$":
    source: publisher
